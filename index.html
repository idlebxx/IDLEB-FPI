<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدلب FPI | نظام الذكاء الاصطناعي </title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<!-- خلفية ثلاثية الأبعاد -->
<div class="scene3d">
    <div class="cube"></div>
    <div class="cube2"></div>
    <div class="sphere"></div>
</div>

<!-- واجهة تسجيل الدخول / إنشاء حساب -->
<div class="auth-overlay" id="authOverlay">
    <div class="auth-card-3d">
        <div class="auth-header">
            <div class="large-avatar">
                <img src="https://i.postimg.cc/hGtg4Kx3/IMG-20260430-084400-653.jpg" alt="مدير النظام" id="mainAvatar">
            </div>
            <h2>نظام إدلب FPI</h2>
            <p>الذكاء الاصطناعي للتعرف على المجرمين</p>
        </div>
        
        <!-- نموذج تسجيل الدخول -->
        <div id="loginPanel">
            <div class="input-group-3d">
                <i class="fas fa-user"></i>
                <input type="text" id="loginUser" placeholder="اسم المستخدم">
            </div>
            <div class="input-group-3d">
                <i class="fas fa-lock"></i>
                <input type="password" id="loginPass" placeholder="كلمة المرور">
            </div>
            <button class="btn-3d" id="doLoginBtn">
                <i class="fas fa-sign-in-alt"></i>
                دخول
            </button>
            <p class="switch-auth">ليس لديك حساب؟ <a href="#" id="showRegister">إنشاء حساب جديد</a></p>
        </div>
        
        <!-- نموذج إنشاء حساب -->
        <div id="registerPanel" style="display:none;">
            <div class="input-group-3d">
                <i class="fas fa-user-circle"></i>
                <input type="text" id="regFullName" placeholder="الاسم الكامل">
            </div>
            <div class="input-group-3d">
                <i class="fas fa-user"></i>
                <input type="text" id="regUser" placeholder="اسم المستخدم">
            </div>
            <div class="input-group-3d">
                <i class="fas fa-lock"></i>
                <input type="password" id="regPass" placeholder="كلمة المرور">
            </div>
            <div class="input-group-3d">
                <i class="fas fa-shield-alt"></i>
                <select id="regRole">
                    <option value="user">مستخدم عادي</option>
                    <option value="officer">ضابط</option>
                    <option value="admin">مدير النظام</option>
                </select>
            </div>
            <button class="btn-3d" id="doRegisterBtn">
                <i class="fas fa-user-plus"></i>
                إنشاء حساب
            </button>
            <p class="switch-auth">لديك حساب؟ <a href="#" id="showLogin">تسجيل الدخول</a></p>
        </div>
        
        <div id="authMessage" class="auth-message"></div>
    </div>
</div>

<!-- المحتوى الرئيسي (يظهر بعد تسجيل الدخول) -->
<div id="mainApp" style="display:none;">
    <!-- شريط جانبي 3D -->
    <aside class="sidebar-3d">
        <div class="profile-section">
            <div class="profile-avatar-large" id="profileAvatar">
                <img src="https://randomuser.me/api/portraits/men/32.jpg" alt="صورة شخصية">
                <div class="online-badge"></div>
            </div>
            <h3 id="profileName">اسم المستخدم</h3>
            <span class="role-badge-3d" id="profileRole">مدير</span>
        </div>
        
        <nav class="nav-3d">
            <a href="#" data-section="dashboard" class="nav-item-3d active">
                <i class="fas fa-tachometer-alt"></i>
                <span>لوحة التحكم</span>
            </a>
            <a href="#" data-section="sketch" class="nav-item-3d">
                <i class="fas fa-robot"></i>
                <span>رسم المجرم بالذكاء الاصطناعي</span>
            </a>
            <a href="#" data-section="database" class="nav-item-3d">
                <i class="fas fa-database"></i>
                <span>قاعدة بيانات المجرمين</span>
                <span class="nav-badge-3d" id="criminalsBadge">0</span>
            </a>
            <a href="#" data-section="identities" class="nav-item-3d">
                <i class="fas fa-id-card"></i>
                <span>الهويات الوطنية</span>
            </a>
            <a href="#" data-section="audit" class="nav-item-3d">
                <i class="fas fa-history"></i>
                <span>سجل العمليات</span>
            </a>
            <a href="#" data-section="analytics" class="nav-item-3d">
                <i class="fas fa-chart-line"></i>
                <span>الإحصائيات</span>
            </a>
        </nav>
        
        <button class="logout-btn-3d" id="logoutBtn3d">
            <i class="fas fa-sign-out-alt"></i>
            تسجيل خروج
        </button>
    </aside>
    
    <!-- المحتوى الرئيسي -->
    <main class="main-content-3d">
        <div class="content-header-3d">
            <h1 id="pageTitle3d">لوحة التحكم الرئيسية</h1>
            <div class="search-box-3d">
                <i class="fas fa-search"></i>
                <input type="text" id="globalSearch3d" placeholder="بحث في قاعدة المجرمين...">
            </div>
        </div>
        
        <div id="dynamicContent3d">
            <!-- سيتم تعبئته -->
        </div>
    </main>
</div>

<script src="script.js"></script>
</body>
</html>
